name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  skills-unit-tests:
    name: databricks-skills unit tests
    runs-on: linux-ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.4"

      - name: Run databricks-skills unit tests
        run: |
          if [ -d databricks-skills/.tests ]; then
            uvx --python 3.11 \
              --with pytest \
              --with databricks-sdk \
              --with requests \
              pytest databricks-skills/.tests/ -m "not integration" -v
          else
            echo "databricks-skills/.tests/ not present on this branch; skipping."
          fi

  lint:
    name: Lint & Format
    runs-on: linux-ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.4"

      - name: Run ruff check
        run: |
          uvx ruff@0.11.0 check \
            --select=E,F,B,PIE \
            --ignore=E401,E402,F401,F403,B017,B904,ANN,TCH \
            --line-length=120 \
            --target-version=py311 \
            databricks-tools-core/ databricks-mcp-server/ .test/src/

      - name: Check formatting
        run: |
          uvx ruff@0.11.0 format --check \
            --line-length=120 \
            --target-version=py311 \
            databricks-tools-core/ databricks-mcp-server/ .test/src/

  validate-skills:
    name: Validate Skills
    runs-on: linux-ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "pyyaml==6.0.3"

      - name: Validate skill structure
        run: python .github/scripts/validate_skills.py
